name: Financial News Pro

on:
  schedule:
    # 每天北京时间 09:00 运行 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run Spider
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python news_spider.py

      - name: Update Cache
        # 将 news_cache.json 存回仓库，确保去重生效
        run: |
          git config --global user.name "Github Robot"
          git config --global user.email "robot@github.com"
          git add news_cache.json || true
          git commit -m "update cache [skip ci]" || true
          git push || true
